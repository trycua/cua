# nginx config for cyclops-cs.
#
# - Serves the Vite-built SPA at /, with a try_files fallback to index.html
#   so deep links like /modules/foo render correctly.
# - Proxies /api/* to the cyclops-cs-backend Deployment; unmatched /api
#   paths return 404 rather than falling through to the SPA.
#
# `${CYCLOPS_CS_BACKEND}` is substituted by nginx's
# envsubst at container start (default behavior of the official
# nginx:alpine image when the file is placed under /etc/nginx/templates/).

# WebSocket upgrade pass-through (used by /api/svc): forward the client's
# Upgrade header and synthesize the matching Connection header. Without
# these, nginx drops the hop-by-hop Upgrade/Connection headers and the
# upstream sees a plain GET — websockify then answers 404 instead of
# completing the 101 handshake (noVNC "Failed to connect to server").
# This file is included at http{} level (conf.d), so map is legal here.
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name _;

    # Static SPA.
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # OAuth discovery metadata for MCP clients (claude.ai connectors et al).
    #
    # MCP authorization (OAuth 2.1) discovers the authorization server via
    # RFC 9728 Protected Resource Metadata at this well-known path. Without
    # these blocks the SPA catch-all above answers 200 text/html for the
    # well-known paths, the client falls back to spec-default /authorize at
    # the origin — also the SPA — and the connector flow dies on the Pools
    # page.
    #
    # RFC 9728 allows a path-suffixed form
    # (/.well-known/oauth-protected-resource/api/svc/...); echo the suffix
    # back as the resource identifier so strict clients that compare
    # metadata.resource against the URL they asked about still match.
    location ~ ^/\.well-known/oauth-protected-resource(?<resource_path>/.*)?$ {
        default_type application/json;
        add_header Access-Control-Allow-Origin * always;
        return 200 '{"resource":"https://$host$resource_path","authorization_servers":["https://auth.cua.ai/realms/cyclops-cs"]}';
    }

    # Legacy fallback (pre-RFC 9728 MCP clients): authorization-server
    # metadata looked up at the resource origin. Keycloak serves the real
    # RFC 8414 document; send clients there.
    location /.well-known/oauth-authorization-server {
        return 302 https://auth.cua.ai/realms/cyclops-cs/.well-known/oauth-authorization-server;
    }

    # cyclops-cs backend — Keycloak-authenticated handlers for:
    #   /api/keys     — per-user API key (service-account client) management
    #   /api/gateway  — token-authenticated proxy to per-pool orchestrators
    #   /api/k8s      — SPA-authenticated proxy to the kubectl-proxy sidecar
    #                   (replaces the old /k8s-api/ nginx block)
    #   /api/orch     — SPA-authenticated proxy to per-namespace orchestrator
    #                   services (replaces the old /orch-api/ nginx block)
    #   /api/batch    — OSGym batch driver (submit/poll/results/cancel)
    #   /api/label    — same, label-scoped streaming variant
    #
    # Backend runs as a standalone Deployment in the same namespace; nginx
    # reaches it via the cyclops-cs-backend Service (envsubst substitutes
    # the cluster DNS URL at container start). Matched before the /api/
    # 404 guard below.
    # /api/svc — sandbox service proxy.
    #
    # Two auth paths:
    #   1. Bearer token → skip oauth2-proxy, backend validates JWT
    #   2. Browser (no Bearer) → oauth2-proxy auth_request → Keycloak
    #      login → session cookie
    #
    # nginx doesn't support conditional auth_request, so we use a
    # named location (@svc_with_oauth) for the cookie path and route
    # Bearer requests directly to the backend.
    location ~ ^/api/svc(/|$) {
        # oauth2-proxy handles both Bearer tokens (--skip-jwt-bearer-tokens
        # returns 202) and cookies. No nginx if-hack needed.
        auth_request /oauth2/auth;
        auth_request_set $auth_user   $upstream_http_x_auth_request_user;
        auth_request_set $auth_email  $upstream_http_x_auth_request_email;
        error_page 401 = /oauth2/start?rd=$request_uri;

        proxy_pass ${CYCLOPS_CS_BACKEND};
        proxy_http_version 1.1;
        # WebSocket upgrade (noVNC /websockify et al.) — see map above.
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        $connection_upgrade;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Auth-Request-User  $auth_user;
        proxy_set_header X-Auth-Request-Email $auth_email;
        proxy_buffering        off;
        proxy_read_timeout     1h;
        proxy_send_timeout     1h;
    }

    # oauth2-proxy endpoints — auth check + login flow.
    # oauth2-proxy runs as a sidecar on the backend pod; nginx reaches
    # it via the backend Service on port 4180 (CYCLOPS_CS_OAUTH2_PROXY).
    location /oauth2/ {
        proxy_pass ${CYCLOPS_CS_OAUTH2_PROXY};
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Pass the rd= query param as the redirect header so oauth2-proxy
        # redirects back to the original /api/svc URL after login.
        proxy_set_header X-Auth-Request-Redirect $arg_rd;
    }

    # oauth2-proxy auth subrequest endpoint (internal only).
    location = /oauth2/auth {
        internal;
        proxy_pass ${CYCLOPS_CS_OAUTH2_PROXY}/oauth2/auth;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        # Forward the Authorization header so oauth2-proxy can validate
        # Bearer tokens (--skip-jwt-bearer-tokens returns 202 for them).
        proxy_set_header Authorization $http_authorization;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # All other /api/* backend routes (no oauth2-proxy).
    location ~ ^/api/(keys|user-keys|gateway|k8s|orch|swagger|batch|label|namespaces|config)(/|$) {
        proxy_pass ${CYCLOPS_CS_BACKEND};
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering        off;
        proxy_read_timeout     1h;
        proxy_send_timeout     1h;
    }

    # Runtime config for the SPA — generated by envsubst at container start
    # so we don't have to bake KC_URL / KC_REALM into the Vite bundle.
    # Loaded from index.html before the React entry point; AuthProvider
    # reads window.__CYCLOPS_CS_CFG__.
    location = /config.js {
        default_type application/javascript;
        return 200 'window.__CYCLOPS_CS_CFG__=${CYCLOPS_CS_CONFIG_JSON};';
    }

    # Upstream Cyclops (cyclops-ctrl) is retired; every live API route is
    # matched by the backend blocks above. Return 404 for anything else so
    # a stray /api call fails loudly instead of receiving index.html.
    location /api/ {
        return 404;
    }

    # The previous /k8s-api/ and /orch-api/ blocks were removed — both are
    # now served by the cyclops-cs-backend Deployment at /api/k8s and
    # /api/orch with Keycloak SSO + OPA authorization in front. The
    # kubectl-proxy container moved with the backend (it talks to it on
    # 127.0.0.1:8001 to inherit the backend pod's ServiceAccount K8s
    # credentials).
}
