name: "Release: Prepare component releases"

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      component:
        description: "Component to prepare (automatic checks both)"
        required: true
        type: choice
        default: automatic
        options:
          - automatic
          - cua-driver-rs
          - lume
      bump:
        description: "Version bump for the selected component"
        required: true
        type: choice
        default: automatic
        options:
          - automatic
          - patch
          - minor
          - major

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: release-please-main
  cancel-in-progress: false

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - name: Generate release GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ github.event.repository.name }}

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - name: Reject an ambiguous manual release request
        if: >-
          github.event_name == 'workflow_dispatch' &&
          inputs.component == 'automatic' &&
          inputs.bump != 'automatic'
        run: |
          echo "::error::Select cua-driver-rs or lume when forcing a bump type."
          exit 1

      - name: Resolve targeted release request
        id: request
        if: >-
          github.event_name == 'workflow_dispatch' &&
          inputs.component != 'automatic'
        run: |
          REQUEST=$(python3 .github/scripts/resolve_release_please_request.py \
            --manifest .release-please-manifest.json \
            --component "${{ inputs.component }}" \
            --bump "${{ inputs.bump }}")
          echo "path=$(jq -r .path <<<"$REQUEST")" >> "$GITHUB_OUTPUT"
          echo "current_version=$(jq -r .current_version <<<"$REQUEST")" >> "$GITHUB_OUTPUT"
          echo "release_as=$(jq -r '.release_as // ""' <<<"$REQUEST")" >> "$GITHUB_OUTPUT"

      # release-please-action v4.4.1, embedding release-please 17.3.0.
      - name: Open or update automatic release pull requests
        id: release-auto
        if: >-
          github.event_name == 'push' ||
          (inputs.component == 'automatic' && inputs.bump == 'automatic')
        uses: googleapis/release-please-action@5c625bfb5d1ff62eadeeb3772007f7f66fdcf071
        with:
          token: ${{ steps.app-token.outputs.token }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      - name: Open or update the targeted release pull request
        if: >-
          github.event_name == 'workflow_dispatch' &&
          inputs.component != 'automatic'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          NPM_CONFIG_IGNORE_SCRIPTS: "true"
          RELEASE_PATH: ${{ steps.request.outputs.path }}
          RELEASE_AS: ${{ steps.request.outputs.release_as }}
        run: |
          set -euo pipefail
          EXPECTED_INTEGRITY='sha512-dB7HsFUpAvU1Wj9RGCINUz8Zi2qQDZiGbDEEVnJ7baNfJmk5XdYhuUFL6RcuDGjReGhp1gzY8Tc2g7vHlM4zpg=='
          ACTUAL_INTEGRITY=$(npm view release-please@17.3.0 dist.integrity)
          if [[ "$ACTUAL_INTEGRITY" != "$EXPECTED_INTEGRITY" ]]; then
            echo "::error::release-please@17.3.0 integrity mismatch"
            exit 1
          fi

          ARGS=(
            release-pr
            "--token=$GH_TOKEN"
            "--repo-url=$GITHUB_REPOSITORY"
            "--target-branch=${{ github.event.repository.default_branch }}"
            "--config-file=release-please-config.json"
            "--manifest-file=.release-please-manifest.json"
            "--path=$RELEASE_PATH"
          )
          if [[ -n "$RELEASE_AS" ]]; then
            ARGS+=("--release-as=$RELEASE_AS")
          fi
          npx --yes release-please@17.3.0 "${ARGS[@]}"

      - name: Synchronize generated files on release pull requests
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          set -euo pipefail
          while read -r number; do
            PR=$(gh pr view "$number" --json headRefName,headRepositoryOwner,files)
            DRIVER=$(echo "$PR" | jq -r \
              '.files | any(.path == "libs/cua-driver/rust/VERSION")')
            LUME=$(echo "$PR" | jq -r \
              '.files | any(.path == "libs/lume/VERSION")')
            if [[ "$DRIVER" != "true" && "$LUME" != "true" ]]; then
              continue
            fi

            OWNER=$(echo "$PR" | jq -r '.headRepositoryOwner.login')
            BRANCH=$(echo "$PR" | jq -r '.headRefName')
            if [[ "$OWNER" != "${GITHUB_REPOSITORY%/*}" || "$BRANCH" != release-please--branches--* ]]; then
              echo "Refusing to run release-branch code from $OWNER:$BRANCH"
              exit 1
            fi

            # Release Please can update an existing branch that predates the
            # current workflow. Refresh it, then replay only this trusted bot
            # branch onto main so validation uses the current release tooling.
            git fetch origin "+refs/heads/main:refs/remotes/origin/main"
            git fetch origin "+refs/heads/$BRANCH:refs/remotes/origin/$BRANCH"
            REMOTE_HEAD=$(git rev-parse "origin/$BRANCH")
            git checkout -B "$BRANCH" "origin/$BRANCH"
            git config user.name "trycua-release[bot]"
            git config user.email "trycua-release[bot]@users.noreply.github.com"
            git rebase origin/main
            if [[ "$DRIVER" == "true" ]]; then
              DRIVER_VERSION=$(tr -d '[:space:]' < libs/cua-driver/rust/VERSION)
              cargo update --manifest-path libs/cua-driver/rust/Cargo.toml \
                -p cua-driver --precise "$DRIVER_VERSION"
              python3 .github/scripts/sync_driver_release_docs.py
              python3 .github/scripts/validate_release_versions.py --product driver
              git add libs/cua-driver/rust/Cargo.lock \
                docs/content/docs/reference/cua-driver/cli-reference.mdx \
                docs/content/docs/reference/cua-driver/mcp-tools.mdx
              COMMIT_MESSAGE="chore(cua-driver-rs): synchronize generated release files"
            else
              python3 .github/scripts/sync_lume_release_docs.py
              python3 .github/scripts/validate_release_versions.py --product lume
              git add docs/content/docs/reference/lume/cli-reference.mdx \
                docs/content/docs/reference/lume/http-api.mdx
              COMMIT_MESSAGE="chore(lume): synchronize release documentation"
            fi
            if git diff --cached --quiet; then
              echo "Generated files already match release PR #$number"
            else
              git commit -m "$COMMIT_MESSAGE"
            fi
            if [[ "$(git rev-parse HEAD)" != "$REMOTE_HEAD" ]]; then
              git push --force-with-lease="refs/heads/$BRANCH:$REMOTE_HEAD" \
                origin "HEAD:refs/heads/$BRANCH"
            fi
          done < <(gh pr list --state open --base main --limit 100 --json number --jq '.[].number')

      - name: Verify repository release versions
        run: python3 .github/scripts/validate_release_versions.py --product all
