name: Nix Build & Integration Tests

on:
  pull_request:
    paths:
      - 'nix/**'
      - 'flake.nix'
      - 'flake.lock'
      - 'libs/cua-driver/rust/**'
      - '.github/workflows/nix-build.yml'
  push:
    branches: [main]
    paths:
      - 'nix/**'
      - 'flake.nix'
      - 'flake.lock'
      - 'libs/cua-driver/rust/**'
      - '.github/workflows/nix-build.yml'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read
  pull-requests: write

env:
  AWS_REGION: us-west-2
  NIX_CACHE_BUCKET: trycua-nix-cache
  NIX_CACHE_SECRET: nix-cache/trycua-nix-cache/signing-key

jobs:
  nix-checks:
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: NixOS integration test
            check_attr: cua-driver-integration
            timeout_minutes: 8
            visual: false
            result_link: result-cua-driver-integration
            artifact_name: ""
          - name: Linux cursor click GIF test
            check_attr: cua-driver-linux-cursor-click-gif
            timeout_minutes: 12
            visual: true
            result_link: result-linux-cursor-click-gif
            artifact_name: cua-driver-linux-cursor-click-gif
          - name: Linux background terminal GIF test
            check_attr: cua-driver-linux-background-terminal-gif
            timeout_minutes: 12
            visual: true
            result_link: result-linux-background-terminal-gif
            artifact_name: cua-driver-linux-background-terminal-gif
          - name: Linux background GUI test (tk)
            check_attr: cua-driver-linux-background-gui-tk
            timeout_minutes: 12
            visual: false
            result_link: result-linux-background-gui-tk
            artifact_name: ""
          - name: Linux background GUI test (chromium)
            check_attr: cua-driver-linux-background-gui-chromium
            timeout_minutes: 25
            visual: false
            result_link: result-linux-background-gui-chromium
            artifact_name: ""
          - name: Linux background GUI test (firefox)
            check_attr: cua-driver-linux-background-gui-firefox
            timeout_minutes: 25
            visual: false
            result_link: result-linux-background-gui-firefox
            artifact_name: ""

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Configure AWS Credentials via OIDC
        uses: aws-actions/configure-aws-credentials@ff717079ee2060e4bcee96c4779b553acc87447c # v4
        with:
          role-to-assume: arn:aws:iam::296062593712:role/github-actions-nix-cache
          aws-region: ${{ env.AWS_REGION }}

      - name: Get Nix signing key
        id: nix-key
        run: |
          SECRET=$(aws secretsmanager get-secret-value \
            --secret-id "${{ env.NIX_CACHE_SECRET }}" \
            --query 'SecretString' --output text)

          SECRET_KEY=$(echo "$SECRET" | jq -r '.secret_key')
          echo "::add-mask::$SECRET_KEY"
          echo "$SECRET_KEY" > "${{ runner.temp }}/signing-key.sec"
          chmod 600 "${{ runner.temp }}/signing-key.sec"

          PUBLIC_KEY=$(echo "$SECRET" | jq -r '.public_key')
          echo "public_key=$PUBLIC_KEY" >> "$GITHUB_OUTPUT"

      - name: Setup AWS credentials file for Nix
        run: |
          mkdir -p ~/.aws
          printf '[default]\naws_access_key_id = %s\naws_secret_access_key = %s\naws_session_token = %s\nregion = %s\n' \
            "$AWS_ACCESS_KEY_ID" "$AWS_SECRET_ACCESS_KEY" "$AWS_SESSION_TOKEN" "$AWS_REGION" > ~/.aws/credentials
          chmod 600 ~/.aws/credentials

          sudo mkdir -p /root/.aws
          sudo bash -c "printf '[default]\naws_access_key_id = %s\naws_secret_access_key = %s\naws_session_token = %s\nregion = %s\n' \
            '$AWS_ACCESS_KEY_ID' '$AWS_SECRET_ACCESS_KEY' '$AWS_SESSION_TOKEN' '$AWS_REGION' > /root/.aws/credentials"
          sudo chmod 600 /root/.aws/credentials

      - name: Install Nix
        uses: cachix/install-nix-action@08dcb3a5e62fa31e2da3d490afc4176ef55ecd72 # v30
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            substituters = s3://${{ env.NIX_CACHE_BUCKET }}?region=${{ env.AWS_REGION }} https://cache.nixos.org
            trusted-substituters = s3://${{ env.NIX_CACHE_BUCKET }}?region=${{ env.AWS_REGION }}
            trusted-public-keys = ${{ steps.nix-key.outputs.public_key }} cache.nixos.org-1:6NCHdD59X431o0gWypbMrAURkbJ16ZPMQFGspcDShjY=

      - name: Run ${{ matrix.name }}
        timeout-minutes: ${{ matrix.timeout_minutes }}
        run: |
          nix build .#checks.x86_64-linux.${{ matrix.check_attr }} \
            --print-build-logs --show-trace \
            -o ${{ matrix.result_link }}

      - name: Collect GIF artifacts
        if: always() && matrix.visual
        run: |
          mkdir -p artifacts
          find -L "${{ matrix.result_link }}/" -name '*.gif' -type f -exec cp {} artifacts/ \; 2>/dev/null || true
          ls -la artifacts/ 2>/dev/null || echo "No GIF artifacts found"

      - name: Upload GIF artifacts
        if: always() && matrix.visual
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ${{ matrix.artifact_name }}
          path: artifacts/*.gif
          if-no-files-found: warn

      - name: Sign and upload to Nix cache
        if: always()
        run: |
          echo "Signing and uploading build artifacts to Nix cache..."
          nix store sign --key-file "${{ runner.temp }}/signing-key.sec" --all
          nix copy --to "s3://${{ env.NIX_CACHE_BUCKET }}?region=${{ env.AWS_REGION }}&want-mass-query=true" --all -L

      - name: Cleanup signing key
        if: always()
        run: rm -f "${{ runner.temp }}/signing-key.sec"

  comment-linux-visual-artifacts:
    name: Comment Linux visual artifacts
    if: always() && github.event_name == 'pull_request'
    needs: [nix-checks]
    runs-on: ubuntu-latest
    steps:
      - name: Comment Linux visual artifacts on PR
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7
        with:
          script: |
            const marker = '<!-- cua-driver-linux-visual-gifs -->';
            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const artifactNames = [
              'cua-driver-linux-cursor-click-gif',
              'cua-driver-linux-background-terminal-gif',
            ];

            let body = `${marker}\n## Linux visual regression artifacts\n\n`;
            body += 'Matrix jobs now run independently. Download GIF artifacts from this workflow run:\n';
            for (const artifactName of artifactNames) {
              body += `- \`${artifactName}\`\n`;
            }
            body += `\n[Open workflow run and download artifacts](${runUrl})\n`;

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              per_page: 100,
            });
            const existing = comments.find(comment =>
              comment.user?.type === 'Bot' && comment.body?.includes(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
