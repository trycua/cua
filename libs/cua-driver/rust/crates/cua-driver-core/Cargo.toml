[package]
name = "cua-driver-core"
version.workspace = true
edition.workspace = true

[dependencies]
tokio = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
anyhow = { workspace = true }
thiserror = { workspace = true }
tracing = { workspace = true }
async-trait = "0.1"
# Used by the shared `image_utils` module — pure PNG/JPEG/resize/crosshair
# helpers extracted from `platform-{macos,windows,linux}/src/capture.rs` so
# all three platforms call the same code path.
image = { workspace = true }
# Window-scoped, indicator-gated human input capture for demonstration
# recording (cross-platform; real backend on Windows, stub elsewhere).
input-capture = { path = "../input-capture" }
# Optional Anthropic call in `process_recording` (author_skill). Same client
# the daemon uses for telemetry; only invoked when ANTHROPIC_API_KEY is set.
ureq = { version = "3", features = ["json"] }

# Used by `cursor_sampler::sample_cursor` to poll the OS mouse position
# during video recording. Same version as platform-windows uses to avoid
# a duplicate crate version.
[target.'cfg(windows)'.dependencies]
windows = { version = "0.58", features = ["Win32_Foundation", "Win32_UI_WindowsAndMessaging"] }
