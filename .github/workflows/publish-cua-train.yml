name: Publish cua-train to PyPI

on:
  push:
    tags:
      - "cua-train/v*"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (build only, skip upload)"
        type: boolean
        default: false

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write  # for OIDC trusted publishing
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tools
        run: pip install hatch

      - name: Build
        working-directory: libs/python/cua-train
        run: hatch build

      - name: Publish to PyPI
        if: ${{ !inputs.dry_run }}
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: libs/python/cua-train/dist/
