name: "CD: Cua Driver RS (cross-platform)"

on:
  push:
    tags:
      - "cua-driver-rs-v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (without v prefix)"
        required: true
        default: "0.1.0"

permissions:
  contents: write

jobs:
  # ── Build ────────────────────────────────────────────────────────────────────
  # One job per (os, target) triple.  Each uploads a versioned tarball
  # containing the `cua-driver` binary.
  build:
    name: ${{ matrix.label }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: linux-x86_64
            runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive_ext: tar.gz
            binary: cua-driver
          - label: windows-x86_64
            runner: windows-latest
            target: x86_64-pc-windows-msvc
            archive_ext: zip
            binary: cua-driver.exe
          - label: darwin-arm64
            runner: macos-15
            target: aarch64-apple-darwin
            archive_ext: tar.gz
            binary: cua-driver
          - label: darwin-x86_64
            runner: macos-15
            target: x86_64-apple-darwin
            archive_ext: tar.gz
            binary: cua-driver

    steps:
      - uses: actions/checkout@v4

      - name: Determine version
        id: version
        shell: bash
        run: |
          if [[ "$GITHUB_REF" == refs/tags/cua-driver-rs-v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/cua-driver-rs-v}"
          else
            VERSION="${{ inputs.version }}"
          fi
          echo "Building version: $VERSION"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry & target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            libs/cua-driver-rs/target
          key: rust-cua-driver-rs-${{ matrix.target }}-${{ hashFiles('libs/cua-driver-rs/Cargo.lock', 'libs/cua-driver-rs/**/Cargo.toml') }}
          restore-keys: |
            rust-cua-driver-rs-${{ matrix.target }}-

      - name: Build (release)
        working-directory: libs/cua-driver-rs
        shell: bash
        run: |
          cargo build -p cua-driver --release --target ${{ matrix.target }}

      - name: Package tarball (unix)
        if: matrix.archive_ext == 'tar.gz'
        working-directory: libs/cua-driver-rs
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          LABEL="${{ matrix.label }}"
          STAGE="cua-driver-rs-${VERSION}-${LABEL}"
          mkdir -p "release/${STAGE}"
          cp "target/${{ matrix.target }}/release/${{ matrix.binary }}" "release/${STAGE}/"
          cp ../../LICENSE.md "release/${STAGE}/LICENSE" 2>/dev/null || true
          (cd release && tar -czf "${STAGE}.tar.gz" "${STAGE}")
          ls -lh "release/${STAGE}.tar.gz"

      - name: Package zip (windows)
        if: matrix.archive_ext == 'zip'
        working-directory: libs/cua-driver-rs
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.version }}"
          $label   = "${{ matrix.label }}"
          $stage   = "cua-driver-rs-${version}-${label}"
          New-Item -ItemType Directory -Force -Path "release/$stage" | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/${{ matrix.binary }}" "release/$stage/"
          if (Test-Path "../../LICENSE.md") { Copy-Item "../../LICENSE.md" "release/$stage/LICENSE" }
          Compress-Archive -Path "release/$stage/*" -DestinationPath "release/$stage.zip" -Force
          Get-Item "release/$stage.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cua-driver-rs-${{ matrix.label }}
          path: libs/cua-driver-rs/release/cua-driver-rs-*.${{ matrix.archive_ext }}
          if-no-files-found: error

  # ── Release ──────────────────────────────────────────────────────────────────
  # Only runs on tag push.  Downloads all built artifacts, generates path-
  # filtered release notes (commits touching libs/cua-driver-rs), and creates
  # a GitHub release with checksums.
  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/cua-driver-rs-v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine version
        id: version
        run: |
          VERSION="${GITHUB_REF#refs/tags/cua-driver-rs-v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Stage release files
        id: stage
        run: |
          mkdir -p release-upload
          find artifacts -type f \( -name "*.tar.gz" -o -name "*.zip" \) \
            -exec cp {} release-upload/ \;
          echo "Release files:"
          ls -lh release-upload/

      - name: Generate SHA256 checksums
        id: checksums
        run: |
          cd release-upload
          {
            echo "## SHA256 Checksums"
            echo '```'
            shasum -a 256 cua-driver-rs-*.{tar.gz,zip} 2>/dev/null | sort
            echo '```'
          } > checksums.txt
          checksums=$(cat checksums.txt)
          echo "checksums<<EOF" >> "$GITHUB_OUTPUT"
          echo "$checksums" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Generate path-filtered release notes
        id: notes
        run: |
          PREV_TAG=$(git tag -l "cua-driver-rs-v*" --sort=-v:refname \
            | grep -v "^${{ github.ref_name }}$" \
            | head -n 1 || echo "")
          echo "Current tag: ${{ github.ref_name }}"
          echo "Previous tag: $PREV_TAG"

          if [ -n "$PREV_TAG" ]; then
            NOTES=$(git log ${PREV_TAG}..HEAD --pretty=format:"* %s (%h) by @%an" -- "libs/cua-driver-rs" | head -50)
          else
            NOTES=$(git log --pretty=format:"* %s (%h) by @%an" -- "libs/cua-driver-rs" | head -50)
          fi
          [ -z "$NOTES" ] && NOTES="* No path-specific changes found"

          {
            echo "RELEASE_NOTES<<EOF"
            echo "## What's Changed"
            echo ""
            echo "$NOTES"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-upload/*
          body: |
            ${{ steps.notes.outputs.RELEASE_NOTES }}

            ${{ steps.checksums.outputs.checksums }}

            ### Platforms
            - `cua-driver-rs-${{ steps.version.outputs.version }}-linux-x86_64.tar.gz`
            - `cua-driver-rs-${{ steps.version.outputs.version }}-windows-x86_64.zip`
            - `cua-driver-rs-${{ steps.version.outputs.version }}-darwin-arm64.tar.gz`
            - `cua-driver-rs-${{ steps.version.outputs.version }}-darwin-x86_64.tar.gz`
          generate_release_notes: false
          make_latest: false
