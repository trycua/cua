[supervisord]
nodaemon=true
user=root
logfile=/var/log/supervisor/supervisord.log
pidfile=/var/run/supervisord.pid
childlogdir=/var/log/supervisor

[unix_http_server]
file=/var/run/supervisor.sock
chmod=0700

[rpcinterface:supervisor]
supervisor.rpcinterface_factory=supervisor.rpcinterface:make_main_rpcinterface

[supervisorctl]
serverurl=unix:///var/run/supervisor.sock

[program:dbus]
command=/usr/bin/dbus-daemon --session --nofork --address=unix:path=/run/user/1000/bus
user=cua
environment=HOME="/home/cua",USER="cua"
autorestart=true
startsecs=1
stdout_logfile=/var/log/supervisor/dbus.log
stderr_logfile=/var/log/supervisor/dbus.error.log
priority=5

[program:vncserver]
command=/usr/local/bin/start-vnc.sh
user=cua
environment=HOME="/home/cua",USER="cua",DISPLAY=":1"
autorestart=true
startsecs=2
stdout_logfile=/var/log/supervisor/vncserver.log
stderr_logfile=/var/log/supervisor/vncserver.error.log
priority=10

[program:novnc]
command=/usr/local/bin/start-novnc.sh
user=cua
environment=HOME="/home/cua",USER="cua"
autorestart=true
startsecs=2
stdout_logfile=/var/log/supervisor/novnc.log
stderr_logfile=/var/log/supervisor/novnc.error.log
priority=20
