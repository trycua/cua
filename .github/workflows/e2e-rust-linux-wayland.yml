name: "E2E: Rust Linux Wayland experimental"

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Optional full 40-character commit SHA; defaults to dispatch SHA"
        required: false
        default: ""

permissions:
  contents: read
  actions: read

jobs:
  source:
    name: "Resolve exact source"
    runs-on: ubuntu-latest
    outputs:
      sha: ${{ steps.resolve.outputs.sha }}
    steps:
      - id: resolve
        name: Validate source SHA
        shell: bash
        env:
          REQUESTED_SHA: ${{ inputs.ref }}
          DISPATCH_SHA: ${{ github.sha }}
        run: |
          sha="${REQUESTED_SHA:-$DISPATCH_SHA}"
          if [[ ! "$sha" =~ ^[0-9a-fA-F]{40}$ ]]; then
            echo "ref must be a full 40-character commit SHA" >&2
            exit 2
          fi
          echo "sha=${sha,,}" >> "$GITHUB_OUTPUT"

  wayland:
    name: "Linux / pure Wayland Rust matrix"
    needs: source
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      CUA_E2E_SOURCE_SHA: ${{ needs.source.outputs.sha }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ needs.source.outputs.sha }}
      - name: Install Nix
        uses: cachix/install-nix-action@08dcb3a5e62fa31e2da3d490afc4176ef55ecd72 # v30
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
      - name: Run complete pure Wayland matrix
        run: >-
          nix develop .#cua-driver-wayland-e2e
          -c scripts/ci/linux/run-rust-e2e-wayland.sh
      - name: Upload Wayland results
        if: always()
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4
        with:
          name: rust-linux-wayland
          path: artifacts/cua-driver/linux
          if-no-files-found: ignore
          compression-level: 0
          retention-days: 14

  summary:
    if: always()
    needs: [source, wayland]
    name: "Linux / pure Wayland summary"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ needs.source.outputs.sha }}
      - name: Download Wayland results
        continue-on-error: true
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v4
        with:
          name: rust-linux-wayland
          path: artifacts/rust-linux-wayland
      - name: Publish typed matrix summary
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          summary="artifacts/rust-linux-wayland/summary.md"
          artifact_id=$(gh api \
            "repos/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID/artifacts?per_page=100" \
            --jq '.artifacts[] | select(.name == "rust-linux-wayland") | .id' | head -n 1)
          if [[ -f "$summary" && -n "$artifact_id" ]]; then
            artifact_url="$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID/artifacts/$artifact_id"
            scripts/ci/link-e2e-evidence.sh "$summary" "$artifact_url" >> "$GITHUB_STEP_SUMMARY"
          elif [[ -f "$summary" ]]; then
            cat "$summary" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "# CUA Rust Linux Wayland E2E" >> "$GITHUB_STEP_SUMMARY"
            echo >> "$GITHUB_STEP_SUMMARY"
            echo "No typed matrix summary was produced; inspect the Wayland job log." >> "$GITHUB_STEP_SUMMARY"
          fi
          echo >> "$GITHUB_STEP_SUMMARY"
          echo "## Trajectory videos" >> "$GITHUB_STEP_SUMMARY"
          echo >> "$GITHUB_STEP_SUMMARY"
          recording_dir="artifacts/rust-linux-wayland/recordings"
          if [[ -d "$recording_dir" ]]; then
            video_count=$(find "$recording_dir" -type f -name recording.mp4 | wc -l | tr -d ' ')
          else
            video_count=0
          fi
          if [[ -n "$artifact_id" ]]; then
            artifact_url="$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID/artifacts/$artifact_id"
            echo "[$video_count full-desktop MP4s]($artifact_url) are retained for 14 days." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "$video_count full-desktop MP4s were collected; no artifact link is available." >> "$GITHUB_STEP_SUMMARY"
          fi
