[package]
name = "cua-driver-core"
version.workspace = true
edition.workspace = true

[features]
default = ["yaml", "rego"]
yaml = ["dep:serde_yaml_ng", "dep:regex"]
rego = ["dep:regorus"]

[dependencies]
tokio = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
anyhow = { workspace = true }
thiserror = { workspace = true }
tracing = { workspace = true }
async-trait = "0.1"
serde_yaml_ng = { version = "0.10", optional = true }
regex = { version = "1", optional = true }
regorus = { version = "0.10.1", optional = true }
# Used by the shared `image_utils` module — pure PNG/JPEG/resize/crosshair
# helpers extracted from `platform-{macos,windows,linux}/src/capture.rs` so
# all three platforms call the same code path.
image = { workspace = true }
# Used by the `browser` module's pooled CDP browser-endpoint WebSocket.
# Same versions platform-macos already depends on, to avoid duplicate
# crate versions in the workspace graph. No TLS features: the endpoint
# contract is loopback ws:// only.
tokio-tungstenite = "0.24"
futures-util = "0.3"
uuid = { workspace = true }

[target.'cfg(unix)'.dependencies]
libc = "0.2"

# Used by `cursor_sampler::sample_cursor` to poll the OS mouse position
# during video recording. Same version as platform-windows uses to avoid
# a duplicate crate version.
[dev-dependencies]
tempfile = "3"

[target.'cfg(windows)'.dependencies]
windows = { version = "0.58", features = ["Win32_Foundation", "Win32_UI_WindowsAndMessaging"] }
