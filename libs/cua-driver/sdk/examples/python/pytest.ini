[pytest]
# Default: run tests sequentially with verbose output.
# asyncio_mode=auto makes all async def test_* functions run on the event loop.
addopts = -v
asyncio_mode = auto

# Parallel option (requires pytest-xdist):
#   pytest -n auto --dist loadfile test_calc_addition.py test_safari_form.py
#
# NOTE: only run files that use DIFFERENT macOS apps in parallel.
# macOS apps like Calculator are single-instance — two parallel workers
# targeting the same app will interfere with each other.
