name: "CI: Test Scripts"

on:
  pull_request:
    paths:
      - ".github/scripts/**"
      - ".github/release-attribution-config.json"
      - ".github/release-manifest.schema.json"
      - ".github/release-backfill/**"
      - ".github/workflows/cd-rust-cua-driver.yml"
      - ".github/workflows/cd-swift-lume.yml"
      - ".github/workflows/release-please.yml"
      - ".github/workflows/release-bump-version.yml"
      - ".github/workflows/release-on-merge.yml"
      - ".release-please-manifest.json"
      - "release-please-config.json"
      - ".github/workflows/ci-test-scripts.yml"
      - ".github/workflows/ci-contributor-attribution.yml"
      - "docs/release-backfill-runbook.md"
      - "libs/cua-driver/scripts/**"

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install jsonschema pytest toml

      - name: Run tests
        run: |
          cd .github/scripts
          pytest tests/ -v

      - name: Test Cua Driver uninstall scripts
        run: python -m pytest libs/cua-driver/scripts/tests/ -v

      - name: Validate historical release backfill
        run: python3 .github/scripts/release_backfill.py validate
