            artifact_name: cua-driver-linux-background-gui-gtk3-abiword
          # GTK4
          - name: Linux background GUI test (gtk4-text-editor)
            check_attr: cua-driver-linux-background-gui-gtk4-text-editor
            timeout_minutes: 15
