[package]
name = "cua-driver-sdk"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
description = "UniFFI-backed imported SDK for the Cua Driver daemon"
publish = false

[lib]
crate-type = ["rlib", "cdylib"]

[dependencies]
cua-driver-contract = { path = "../cua-driver-contract" }
cua-driver-core = { path = "../cua-driver-core", default-features = false }
serde = { workspace = true }
serde_json = { workspace = true }
thiserror = { workspace = true }
uniffi.workspace = true

[dev-dependencies]
tempfile = "3"
uniffi = { workspace = true, features = ["bindgen"] }
