name: "CD: Container XFCE Cua"

on:
  push:
    tags:
      - "docker-xfce-cua-v*.*.*"
  workflow_dispatch:

jobs:
  publish:
    uses: ./.github/workflows/docker-reusable-publish.yml
    with:
      image_name: xfce-cua
      context_dir: libs/xfce-cua
      tag_prefix: docker-xfce-cua-v
      docker_hub_org: trycua
    secrets:
      DOCKER_HUB_TOKEN: ${{ secrets.DOCKER_HUB_TOKEN }}
