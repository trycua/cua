[project]
name = "cua-driver-sdk"
version = "0.1.0"
description = "Playwright-style Python SDK and pytest plugin for cua-driver UI automation"
readme = "README.md"
license = "MIT"
authors = [
    { name = "TryCua", email = "hello@trycua.com" }
]
keywords = ["ui-testing", "accessibility", "automation", "macos", "cua-driver"]
requires-python = ">=3.10"
dependencies = []

[project.optional-dependencies]
# Minimum for sync tests + fixtures
test = ["pytest>=8.0"]

# Parallel test execution across files (--dist loadfile / -n auto)
parallel = ["pytest-xdist>=3.5"]

# Async test support (async def test_...)
async = ["pytest-asyncio>=0.23"]

# Everything for the full example suite
examples = [
    "pytest>=8.0",
    "pytest-xdist>=3.5",
    "pytest-asyncio>=0.23",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/cua_driver", "src/pytest_cua"]

[tool.hatch.build.targets.wheel.sources]
"src" = ""

[project.entry-points."pytest11"]
cua = "pytest_cua.plugin"

# ---------------------------------------------------------------------------
# pytest defaults for the examples directory
# ---------------------------------------------------------------------------
[tool.pytest.ini_options]
asyncio_mode = "auto"
# Parallel execution: each file in its own worker.
# Override on the CLI: pytest -n 1 to disable.
addopts = "-n auto --dist loadfile"
testpaths = ["tests"]
