[package]
name = "focus-monitor-win"
version.workspace = true
edition.workspace = true
# Windows-only binary used by integration tests to verify the UX guard:
# clicking/typing into background windows must not steal focus from this window.

[[bin]]
name = "focus-monitor-win"
path = "src/main.rs"

[target.'cfg(target_os = "windows")'.dependencies]
windows = { version = "0.58", features = [
    "Win32_Foundation",
    "Win32_UI_WindowsAndMessaging",
    "Win32_System_Threading",
    "Win32_Graphics_Gdi",
] }
