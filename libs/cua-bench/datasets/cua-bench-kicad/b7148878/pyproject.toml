[tool.cua-bench]
description = "Design a KiCad-style schematic of a two opamp circuit that converts a bipolar +/- 10 V analog signal to a positive 0 to 5V analog signal that can be delivered to an ADC or microcontroller.\n\n\t• The first opamp (U1) buffers the input signal and is configured as a follower: \n\t\t○ Pin 1 is directly connected to overall circuit input.\n\t\t○ Pin 2 is connected directly to Pin 5\n\t\t○ Pin 3 is connected to a +15 Vdc power supply and a 0.1 uF decoupling capacitor.\n\t\t○ Pin 4 is connected to a -15 Vdc power supply and a 0.1 uF decoupling capacitor.\n\t\t○ Pin 5 is also connected to a 100 kOhm resistor (R1).\n\t• The second opamp (U2) is configured to provide voltage division and shifting.\n\t\t○ Pin 1 is connected to the shift voltage. This is generated by connecting a 4.096 Vdc reference to a 10 kOhm resistor (R3) followed by a 162 ohm resistor (R4). The other end of R4 is connected in parallel to a 10 kOhm resistor, 1 uF unpolarized capacitor, and Pin 1.\n\t\t○ Pin 2 is connected to the other side of R1 mentioned above.\n\t\t○ Pin 2 is also connected to a parallel combination of a 23 kOhm resistor (R2) and a 43 pF unpolarized capacitor (C1). The other end of this combination is connected to Pin 5\n\t\t○ Pin 3 is connected to a +5 Vdc power supply and a 0.1 uF decoupling capacitor.\n\t\t○ Pin 4 is connected to ground.\n\t\t○ Pin 5 is also connected to a 10 kOhm load, which provides a path to ground during startup transients.\n\t\t○ Pin 5 also provides the overall circuit output.\n\t• Reference: This circuit is modified from \"Analog Engineer\"
difficulty = "medium"
category = "eda"
tags = ["kicad", "schematic", "eda"]
