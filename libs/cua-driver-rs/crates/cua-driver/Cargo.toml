[package]
name = "cua-driver"
version.workspace = true
edition.workspace = true
description = "Cross-platform background computer-use automation daemon (MCP server)"
default-run = "cua-driver"

[[bin]]
name = "cua-driver"
path = "src/main.rs"

[dependencies]
tokio = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
anyhow = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
mcp-server = { path = "../mcp-server" }
cursor-overlay = { path = "../cursor-overlay" }
async-trait = "0.1"
base64 = { workspace = true }
uuid = { workspace = true }
# Telemetry HTTP client. `ureq` over `reqwest` for the small dep footprint:
# PostHog ingest is a single fire-and-forget POST with a 3s timeout. Uses
# rustls (default) so Linux/Windows builds don't require system OpenSSL.
ureq = { version = "3", features = ["json"] }

# Used by crate::bundle::parent_is_not_launchd() for the TCC
# auto-relaunch detection path on Unix (only the macOS heuristic
# actually fires, but the crate compiles on Linux too).
[target.'cfg(unix)'.dependencies]
libc = "0.2"

[target.'cfg(target_os = "macos")'.dependencies]
platform-macos = { path = "../platform-macos" }

[target.'cfg(target_os = "windows")'.dependencies]
platform-windows = { path = "../platform-windows" }

[target.'cfg(target_os = "linux")'.dependencies]
platform-linux = { path = "../platform-linux" }

[dev-dependencies]
tokio = { workspace = true, features = ["full"] }
image = { workspace = true }
base64 = { workspace = true }

[target.'cfg(target_os = "windows")'.dev-dependencies]
platform-windows = { path = "../platform-windows" }
