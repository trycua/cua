[crate-roots]
cyclops_sdk = "../sdk"
cyclops_sdk_schema = "../sdk-schema"

[crates.cyclops_sdk.bindings.python]
cdylib_name = "cyclops_sdk"

[crates.cyclops_sdk.bindings.python.external_packages]
cyclops_sdk_schema = "cyclops_sdk"

[crates.cyclops_sdk_schema.bindings.python]
cdylib_name = "cyclops_sdk"

[crates.cyclops_sdk.bindings.kotlin]
package_name = "ai.cua.cyclops.sdk"
cdylib_name = "cyclops_sdk"

[crates.cyclops_sdk.bindings.kotlin.external_packages]
cyclops_sdk_schema = "ai.cua.cyclops.sdk.schema"

[crates.cyclops_sdk_schema.bindings.kotlin]
package_name = "ai.cua.cyclops.sdk.schema"
cdylib_name = "cyclops_sdk"

[crates.cyclops_sdk.bindings.swift]
module_name = "CyclopsSdk"
ffi_module_name = "CyclopsSdkFFI"
ffi_module_filename = "CyclopsSdkFFI"

[crates.cyclops_sdk_schema.bindings.swift]
module_name = "CyclopsSdkSchema"
ffi_module_name = "CyclopsSdkSchemaFFI"
ffi_module_filename = "CyclopsSdkSchemaFFI"

[crates.cyclops_sdk.bindings.ruby]
cdylib_name = "cyclops_sdk"

[crates.cyclops_sdk_schema.bindings.ruby]
cdylib_name = "cyclops_sdk"
