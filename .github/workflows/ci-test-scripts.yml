name: "CI: Test Scripts"

on:
  pull_request:
    paths:
      - ".github/scripts/**"
      - ".github/release-attribution-config.json"
      - ".github/release-manifest.schema.json"
      - ".github/workflows/cd-rust-cua-driver.yml"
      - ".github/workflows/cd-swift-lume.yml"
      - ".github/workflows/release-please.yml"
      - ".release-please-manifest.json"
      - "release-please-config.json"
      - ".github/workflows/ci-test-scripts.yml"

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install jsonschema pytest toml

      - name: Run tests
        run: |
          cd .github/scripts
          pytest tests/ -v
